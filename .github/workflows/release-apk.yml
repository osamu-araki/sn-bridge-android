# Version: 1.0.0 | Updated: 2026-06-10
# [2026-06-10] main push 毎に APK をビルドし、Portal の OTA リリース API に自動アップロード。
#   投入は is_published=false のため本番には流れず、Portal UI から手動で公開する運用。
#
# 必要な GitHub Secrets:
#   - PORTAL_BASE_URL              例: https://portal.example.com
#   - BRIDGE_APP_UPLOAD_TOKEN      Portal /admin/bridge-monitor/releases で発行
#   - BRIDGE_APP_CHECK_TOKEN_BUILD APK にビルド時埋め込みする端末側 manifest 認証用 Bearer
#                                  Portal の `bridge_app_check_token` と同値
#   - ANDROID_DEBUG_KEYSTORE_B64   既存端末と同じ debug 署名を保つため、ローカル
#                                  ~/.android/debug.keystore を base64 化したもの
#
# versionCode: <github.run_number>00（例: run #5 → 500）で単調増加（手元の固定値 3 と被らない）
# versionName: 1.2.<github.run_number>
name: Release APK

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "gradle/**"
      - "settings.gradle.kts"
      - ".github/workflows/release-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VERSION_CODE_OVERRIDE: ${{ github.run_number }}00
      VERSION_NAME_OVERRIDE: 1.2.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore debug keystore from secret
        run: |
          mkdir -p ~/.android
          # 念のため CR/LF を除去してから base64 decode（Secret に改行が混入していても吸収）
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_B64" | tr -d '\r\n' | base64 -d > ~/.android/debug.keystore
          if [ ! -s ~/.android/debug.keystore ]; then
            echo "ANDROID_DEBUG_KEYSTORE_B64 が空 / 不正です。Secrets を確認してください。" >&2
            exit 1
          fi
          # 復元後の keystore SHA-1 をログ出力（既存端末と一致するかは目視確認）
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey 2>&1 \
            | grep "SHA1:" || true
        env:
          ANDROID_DEBUG_KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug
        env:
          VERSION_CODE_OVERRIDE: ${{ env.VERSION_CODE_OVERRIDE }}
          VERSION_NAME_OVERRIDE: ${{ env.VERSION_NAME_OVERRIDE }}
          # [2026-06-10] APK にビルド時埋め込み: DEFAULT_PORTAL_CHECK_TOKEN
          BRIDGE_APP_CHECK_TOKEN_BUILD: ${{ secrets.BRIDGE_APP_CHECK_TOKEN_BUILD }}

      - name: Locate APK
        id: locate
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          if [ ! -f "$APK" ]; then
            echo "APK が見つかりません: $APK" >&2
            exit 1
          fi
          SHA256=$(shasum -a 256 "$APK" | awk '{print $1}')
          SIZE=$(wc -c < "$APK" | tr -d ' ')
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Request signed upload URL
        id: upload_url
        run: |
          # [Codex#4] 末尾スラッシュを除去して //api を避ける
          BASE="${PORTAL_BASE_URL%/}"
          RESP=$(curl -fsS -X POST \
            -H "Authorization: Bearer $BRIDGE_APP_UPLOAD_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"version_code\": $VERSION_CODE_OVERRIDE, \"version_name\": \"$VERSION_NAME_OVERRIDE\"}" \
            "$BASE/api/admin/bridge-monitor/releases/upload-url")
          UPLOAD_URL=$(echo "$RESP" | jq -r .upload_url)
          APK_PATH=$(echo "$RESP" | jq -r .apk_path)
          if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
            echo "upload_url 取得失敗: $RESP" >&2
            exit 1
          fi
          echo "upload_url=$UPLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
        env:
          PORTAL_BASE_URL: ${{ secrets.PORTAL_BASE_URL }}
          BRIDGE_APP_UPLOAD_TOKEN: ${{ secrets.BRIDGE_APP_UPLOAD_TOKEN }}

      - name: PUT APK to Supabase Storage
        run: |
          curl -fsS -X PUT \
            -H "Content-Type: application/vnd.android.package-archive" \
            --upload-file "${{ steps.locate.outputs.apk }}" \
            "${{ steps.upload_url.outputs.upload_url }}"

      - name: Register release metadata
        run: |
          BASE="${PORTAL_BASE_URL%/}"
          curl -fsS -X POST \
            -H "Authorization: Bearer $BRIDGE_APP_UPLOAD_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --argjson vc "$VERSION_CODE_OVERRIDE" \
              --arg vn "$VERSION_NAME_OVERRIDE" \
              --arg path "${{ steps.upload_url.outputs.apk_path }}" \
              --argjson size "${{ steps.locate.outputs.size }}" \
              --arg sha256 "${{ steps.locate.outputs.sha256 }}" \
              --arg notes "GitHub Actions build #${{ github.run_number }} (${{ github.sha }})" \
              '{version_code:$vc, version_name:$vn, apk_path:$path, apk_size:$size, sha256:$sha256, release_notes:$notes}')" \
            "$BASE/api/admin/bridge-monitor/releases"
        env:
          PORTAL_BASE_URL: ${{ secrets.PORTAL_BASE_URL }}
          BRIDGE_APP_UPLOAD_TOKEN: ${{ secrets.BRIDGE_APP_UPLOAD_TOKEN }}

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ env.VERSION_NAME_OVERRIDE }}
          path: ${{ steps.locate.outputs.apk }}
          retention-days: 30
